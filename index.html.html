<style>
  :root{
    --bone:#EFEBE2; --paper:#FBFAF5; --ink:#1E2723; --ink-soft:#5C645D;
    --line:#D9D3C6; --line-soft:#E7E2D6;
    --glow:#DC785F; --glow-deep:#C2543B; --glow-soft:#F2C9B6;
    --glacier:#2C857E; --glacier-deep:#1F635E; --gold:#C2922F; --night:#27323a;
    --tab-h:62px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; background:var(--bone); color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .mono{ font-family:"JetBrains Mono",ui-monospace,Menlo,monospace; }
  h1,h2,h3,h4{ font-family:"Fraunces",Georgia,serif; font-weight:500; line-height:1.12; letter-spacing:-0.01em; margin:0; }
  em{ font-style:italic; color:var(--glow-deep); font-weight:400; }
  a{ color:var(--glacier-deep); text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }

  /* ---------- APP SHELL ---------- */
  .app{ max-width:560px; margin:0 auto; min-height:100vh; }
  .topbar{
    position:sticky; top:0; z-index:40;
    background:rgba(239,235,226,.82); backdrop-filter:saturate(180%) blur(14px); -webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--line-soft);
    padding:calc(env(safe-area-inset-top) + 12px) 18px 11px; display:flex; align-items:center; justify-content:space-between;
  }
  .topbar .tt{ font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--glow-deep); }
  .topbar .clock{ font-family:"JetBrains Mono",monospace; font-size:13px; color:var(--ink-soft); }

  .screens{ padding:0 0 calc(var(--tab-h) + env(safe-area-inset-bottom) + 20px); }
  .screen{ display:none; padding:18px 18px 0; animation:fade .4s ease both; }
  .screen.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion:reduce){ .screen{ animation:none; } }

  .screen-title{ font-size:30px; margin:6px 0 2px; font-weight:600; }

function mapBtns(p, withDir){
  let h = `<a class="btn sm" href="${gm(p.lat,p.lng)}" target="_blank" rel="noopener">${icon.pin}Google Maps</a>`;
  if(withDir) h += `<a class="btn sm ghost" href="${gmd(p.lat,p.lng)}" target="_blank" rel="noopener">${icon.car}Cómo llegar</a>`;
  return h;
}
function heartBtn(id){
  const on = isFav(id);
  return `<button class="heart ${on?'on':''}" onclick="toggleFav('${id}',this)" aria-label="favorito">${icon.heart}</button>`;
}
function sleepCard(id){
  const p = placeById(id); if(!p) return '';
  const alt = id==='misurina_area' ? 'Lago Antorno (gratis)'
    : id==='toblachersee' ? 'Camping Olympia Dobbiaco'
    : id==='santacristina' ? 'Gasthof Pontives (con servicios, 25 €)'
    : id==='fusina' ? 'Camper Park San Giuliano (Mestre)'
    : '';
  return `<div class="mini sleep">
    <div class="row"><h4 class="k">Dónde dormir</h4>${heartBtn(p.id)}</div>
    <div class="name">${esc(p.n)}</div>
    <div class="co">${esc(p.m)} ${p.rating?'· ★ '+p.rating:''}</div>
    <div class="co">${p.lat}, ${p.lng}</div>
    <p class="pc">${esc(p.note)}</p>
    ${alt?`<p class="pc" style="margin-top:6px"><b>Alternativa:</b> ${esc(alt)}</p>`:''}
    <div class="btnrow">${mapBtns(p,true)}</div>
  </div>`;
}
function routeCard(rid){
  const r = ROUTES.find(x=>x.id===rid); if(!r) return '';
  const s = placeById(r.start);
  return `<div class="mini route">
    <div class="row"><h4 class="k">Ruta · ficha</h4>${heartBtn('route_'+r.id)}</div>
    <div class="name">${esc(r.n)}</div>
    <div class="co">${r.sender} · inicio: ${esc(s?s.n:'')}</div>
    <div class="grid2" style="margin:10px 0">
      <div><div class="k">Distancia</div><div class="big-num" style="font-size:19px">${r.dist}</div></div>
      <div><div class="k">Duración</div><div class="big-num" style="font-size:19px">${r.dur}</div></div>
      <div><div class="k">Desnivel</div><div class="big-num" style="font-size:19px">${r.desn}</div></div>
      <div><div class="k">Dificultad</div><div class="big-num" style="font-size:16px">${r.dif}</div></div>
    </div>
    <div class="k">Mejor hora</div><p class="pc" style="margin:2px 0 8px">${r.best}</p>
    <div class="k">Qué llevar</div><ul class="clean">${r.bring.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
    <div class="k" style="margin-top:8px">Consejos</div><ul class="clean">${r.tips.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
    <div class="k" style="margin-top:8px">Errores típicos</div><ul class="clean">${r.err.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>

function tripDayForToday(){
  const todayISO = new Date().toISOString().slice(0,10);
  const d = DAYS.find(x=>x.dateISO===todayISO);
  return d ? d.id : null;
}
function nowMinutes(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function parseT(t){ const m=(t||'').match(/(\d{1,2}):(\d{2})/); return m?(+m[1]*60+ +m[2]):null; }
function renderHoy(){
  const realDay = tripDayForToday();

  if(isLive){ const now=nowMinutes(); d.tl.forEach((it,i)=>{ const m=parseT(it.t); if(m!=null && m<=now) curIdx=i; }); }
  const cur = d.tl[curIdx], next = d.tl[curIdx+1];
  const sleep = d.sleep?placeById(d.sleep):null;
  const dayChips = DAYS.map(x=>`<button class="chip ${active===x.id?'active':''}" onclick="setHoyDay(${x.id})">D${x.id}</button>`).join('');

      <div class="mono" style="font-size:12px;color:var(--ink-soft)">${cur?cur.t:''} ${isLive?'· hora real '+new Date().toTimeString().slice(0,5):''}</div>
    </div>

    ${next?`<div class="card" style="margin-top:12px"><div class="k">Próxima parada</div><div class="name" style="font-family:Fraunces,serif;font-size:19px;margin-top:4px">${next.x.replace(/<[^>]+>/g,'')}</div><div class="mono" style="font-size:12px;color:var(--ink-soft);margin-top:3px">a las ${next.t}</div></div>`:''}

    <div class="grid2" style="margin-top:12px">
      <div class="mini sleep"><h4 class="k">Dónde duermes hoy</h4><div class="name" style="font-size:16px">${sleep?esc(sleep.n):'Vuelo a casa'}</div>${sleep?`<div class="co">${sleep.lat}, ${sleep.lng}</div><div class="btnrow">${mapBtns(sleep,true)}</div>`:''}</div>
      <div class="mini"><h4 class="k">Luz</h4><div class="pc">☀ Amanece <b>${d.sr}</b><br>☀ Anochece <b>${d.ss}</b></div></div>
    </div>

    ${d.legs.length?`<h4 class="k" style="margin:18px 0 8px">Próxima conducción</h4>${legCard(d.legs[0])}`:''}

    <div class="grid2" style="margin-top:12px">
      <div class="mini"><h4 class="k">Próxima compra</h4><p class="pc">${nextOf(d,'compra')}</p></div>
      <div class="mini"><h4 class="k">Repostaje</h4><p class="pc">${active>=5?'Repostar a LLENO antes de devolver (Mestre/Mira).':'Cuando baje del cuarto: gasolinera de valle (Dobbiaco/Bolzano).'}</p></div>
    </div>

    ${wxLine?`<div class="card" style="margin-top:12px"><div class="k">Tiempo en ${esc(sleep.n)}</div>${wxLine}</div>`:`<button class="btn ghost" style="margin-top:12px" onclick="loadWeatherFor('${d.sleep||''}')">${icon.sun}Cargar tiempo de hoy</button>`}

    <div class="tip" style="margin-top:14px"><b>Copiloto:</b> abre la pestaña <b>Días</b> para el detalle completo, o <b>Mapa</b> para todos los enlaces a Google Maps.</div>
  `;
}

function nextOf(d,cat){

function pendingHTML(){
  const items = store.get('pending', []);
  const list = items.map((t,i)=>`<div class="chk ${t.done?'done':''}"><span class="box" onclick="togglePending(${i})">${t.done?icon.check:''}</span><span class="lab" style="flex:1">${esc(t.text)}</span><button class="heart" onclick="delPending(${i})" style="padding:2px">✕</button></div>`).join('');
  return `${list||'<p class="pc" style="color:var(--ink-soft)">Sin pendientes.</p>'}<div class="row" style="margin-top:10px;gap:6px"><input class="inp" id="pend-inp" placeholder="Nueva tarea…"><button class="btn sm" onclick="addPending()">+</button></div>`;
}
function addPending(){ const v=document.getElementById('pend-inp').value.trim(); if(!v)return; const a=store.get('pending',[]); a.push({text:v,done:false}); store.set('pending',a); renderViaje(); state.viajeOpen='pendientes'; renderViaje(); }
function togglePending(i){ const a=store.get('pending',[]); a[i].done=!a[i].done; store.set('pending',a); renderViaje(); }
function delPending(i){ const a=store.get('pending',[]); a.splice(i,1); store.set('pending',a); renderViaje(); }

/* expenses */
function renderExpenses(){
  const e = store.get('expenses', []);
  if(!e.length) return '<p class="pc" style="color:var(--ink-soft)">Sin gastos aún.</p>';
  const total = e.reduce((s,x)=>s+x.amt,0);
  return e.map((x,i)=>`<div class="chk" style="cursor:default"><span class="lab" style="flex:1">${esc(x.desc)}</span><b class="mono">${x.amt.toFixed(2)} €</b> <button class="heart" onclick="delExpense(${i})" style="padding:2px 6px">✕</button></div>`).join('')
    + `<hr><div class="row"><b>Total</b><b class="right mono">${total.toFixed(2)} €</b></div><div class="row"><span class="pc" style="color:var(--ink-soft)">Por persona (÷8)</span><b class="right mono">${(total/8).toFixed(2)} €</b></div>`;
}
function addExpense(){ const d=document.getElementById('exp-desc').value.trim(); const a=parseFloat(document.getElementById('exp-amt').value.replace(',','.')); if(!d||isNaN(a))return; const e=store.get('expenses',[]); e.push({desc:d,amt:a}); store.set('expenses',e); state.viajeOpen='presup'; renderViaje(); }
function delExpense(i){ const e=store.get('expenses',[]); e.splice(i,1); store.set('expenses',e); renderViaje(); }

/* ============================ FAVORITOS ============================ */
function favs(){ return store.get('favs', []); }
function isFav(id){ return favs().includes(id); }
function toggleFav(id, el){
  let f = favs(); const on=f.includes(id);
  if(on) f=f.filter(x=>x!==id); else f.push(id);
  store.set('favs', f);
  if(el){ el.classList.toggle('on', !on); }
  if(state.tab==='fav') renderFav();
}
function favLabel(id){
  if(id.startsWith('route_')){ const r=ROUTES.find(x=>x.id===id.slice(6)); return r?{n:r.n+' (ruta)',ll:null}:null; }
  if(id.startsWith('ven_')){ const v=[...VENECIA.ver,...VENECIA.comer].find(x=>'ven_'+x.lat===id); return v?{n:v.n+' (Venecia)',lat:v.lat,lng:v.lng}:null; }
  const p=placeById(id); return p?{n:p.n,lat:p.lat,lng:p.lng}:null;
}
function renderFav(){
  const f=favs();
  const rows = f.map(id=>{ const o=favLabel(id); if(!o) return ''; return `<div class="prow"><div class="ic">${icon.heart}</div><div style="flex:1"><div class="pn">${esc(o.n)}</div>${o.lat?`<div class="pa"><a class="btn sm" href="${gm(o.lat,o.lng)}" target="_blank" rel="noopener">${icon.pin}Maps</a><a class="btn sm ghost" href="${gmd(o.lat,o.lng)}" target="_blank" rel="noopener">${icon.car}Ir</a></div>`:''}</div><button class="heart on" onclick="toggleFav('${id}')">${icon.heart}</button></div>`;}).join('');
  document.getElementById('s-fav').innerHTML = `
    <div class="eyebrow">Guardados</div><h1 class="screen-title">Favoritos</h1>
    <p class="screen-sub">Toca el ♥ en cualquier sitio o ruta para guardarlo aquí.</p>
    ${f.length?`<div class="card">${rows}</div>`:`<div class="card" style="text-align:center;padding:36px 18px"><div style="font-size:30px">♡</div><p class="pc" style="color:var(--ink-soft);margin-top:8px">Aún no has guardado nada.<br>Pulsa el corazón en las fichas.</p></div>`}`;
}

/* ============================ WEATHER (Open-Meteo) ============================ */
const WMO = c => c===0?['☀️','Despejado'] : c<=3?['⛅','Parcialmente nublado'] : (c===45||c===48)?['🌫️','Niebla'] : (c>=51&&c<=67)?['🌧️','Lluvia'] : (c>=71&&c<=77)?['❄️','Nieve'] : (c>=80&&c<=82)?['🌦️','Chubascos'] : (c>=95)?['⛈️','Tormenta'] : ['☁️','Nublado'];
async function fetchWX(p){
  if(WX[p.id]) return WX[p.id];
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset&timezone=Europe%2FRome&start_date=2026-07-01&end_date=2026-07-06`;
  try{ const r=await fetch(url); const j=await r.json(); WX[p.id]=j.daily; store.set('wx_'+p.id, j.daily); return j.daily; }
  catch(e){ const c=store.get('wx_'+p.id,null); if(c){WX[p.id]=c; return c;} return null; }
}
function wxInline(daily){
  if(!daily) return '<p class="pc" style="color:var(--ink-soft)">Sin conexión: previsión no disponible.</p>';
  // pick today's index if in range else first
  const todayISO=new Date().toISOString().slice(0,10);
  let idx=daily.time.indexOf(todayISO); if(idx<0) idx=0;
  const [e,t]=WMO(daily.weather_code[idx]);
  return `<div class="wx" style="margin-top:6px"><span class="ico">${e}</span><span class="big">${Math.round(daily.temperature_2m_max[idx])}°</span><div><div class="pc" style="font-size:13px">${t} · mín ${Math.round(daily.temperature_2m_min[idx])}°</div><div class="mono" style="font-size:11px;color:var(--ink-soft)">lluvia ${daily.precipitation_probability_max[idx]}% · ☀ ${daily.sunrise[idx].slice(11)} / ${daily.sunset[idx].slice(11)}</div></div></div>`;
}
async function loadWeatherFor(id){ const p=placeById(id); if(!p)return; await fetchWX(p); renderHoy(); }
async function loadAllWeather(){
  document.getElementById('wx-box').innerHTML='<p class="pc">Cargando…</p>';
  const bases=['misurina_area','toblachersee','santacristina','carezza','fusina'];
  for(const id of bases){ await fetchWX(placeById(id)); }
  renderViaje(); state.viajeOpen='meteo'; renderViaje(); renderWeatherBox();
}
function renderWeatherBox(){
  const box=document.getElementById('wx-box'); if(!box) return;
  const ref = WX['misurina_area']; if(!ref){ return; }
  let rows='';
  ref.time.forEach((day,i)=>{
    const [e,t]=WMO(ref.weather_code[i]);
    const dd=new Date(day); const lbl=['Mié','Jue','Vie','Sáb','Dom','Lun','Mar'][0]; // fallback
    rows+=`<div class="wxday"><span class="d">${day.slice(8)}/${day.slice(5,7)}</span><span class="e">${e}</span><span class="pc" style="font-size:13px">${t}</span><span class="tmp">${Math.round(ref.temperature_2m_max[i])}° <small>/ ${Math.round(ref.temperature_2m_min[i])}°</small></span></div>`;
  });
  box.innerHTML=`<div class="k">Misurina (base Este) · 1–6 jul</div>${rows}<p class="pc" style="font-size:12px;color:var(--ink-soft);margin-top:8px">Previsión orientativa a 8-13 días. Mañanas despejadas, tormentas a media tarde son lo habitual en julio.</p>`;
}

/* ============================ NAV ============================ */
function buildTabs(){
  const tabs=[['hoy','clock','Hoy'],['dias','cal','Días'],['mapa','map','Mapa'],['viaje','bag','Viaje'],['fav','heart','Favoritos']];
  document.getElementById('tabbar').innerHTML = tabs.map(t=>`<button class="tab ${state.tab===t[0]?'active':''}" data-tab="${t[0]}" onclick="go('${t[0]}')">${icon[t[1]]}<span class="lab">${t[2]}</span></button>`).join('');
}
function go(tab){
  state.tab=tab; buildTabs();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+tab).classList.add('active');
  if(tab==='hoy') renderHoy();
  if(tab==='dias') renderDias();
  if(tab==='mapa') renderMapa();
  if(tab==='viaje') renderViaje();
  if(tab==='fav') renderFav();
  window.scrollTo({top:0});
  try{ history.replaceState(null,'','#'+tab); }catch(e){}
}

/* ============================ SHEET (reservado para detalle) ============================ */
function closeSheet(){ document.getElementById('sheet').classList.remove('on'); document.getElementById('sheetbg').classList.remove('on'); }

/* ============================ MISC ============================ */
function flash(){ /* subtle save feedback */ }
function tickClock(){ const n=new Date(); document.getElementById('clock').textContent=n.toTimeString().slice(0,5); }

/* ============================ INIT ============================ */
(function init(){
  // default day = today's trip day if within range
  const td=tripDayForToday(); if(td) state.day=td;
  buildTabs();
  // restore tab from hash
  const h=(location.hash||'').replace('#',''); const valid=['hoy','dias','mapa','viaje','fav'];
  go(valid.includes(h)?h:'hoy');
  tickClock(); setInterval(tickClock,1000*15);
})();
</script>
